name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Setup Java (Required for Android)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 4️⃣ Install dependencies
      - name: Install Dependencies
        run: npm install

      # 5️⃣ Build Web Project
      - name: Build Web Project
        run: |
          npm run build || true

          if [ ! -d "dist" ]; then
            echo "dist folder missing, creating fallback..."
            mkdir dist
            cp index.html dist/ || true
          fi

      # 6️⃣ Setup Capacitor
      - name: Setup Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

          cat <<EOF > capacitor.config.json
          {
            "appId": "com.financepro.app",
            "appName": "Finance Pro",
            "webDir": "dist",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "hostname": "localhost",
              "cleartext": true
            }
          }
          EOF

          npx cap add android || true
          npx cap sync android

      # 7️⃣ Fix Kotlin Conflict 🔥
      - name: Fix Kotlin Conflict
        run: |
          cd android

          echo "
          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
              }
          }" >> app/build.gradle

          # Remove old conflicting kotlin লাইব্রেরি
          sed -i '/kotlin-stdlib-jdk8/d' app/build.gradle || true

      # 8️⃣ Cache Gradle (Speed up build)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      # 9️⃣ Build APK
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --stacktrace

      # 🔟 Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FinancePro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
